services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - 6333:6333
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped
  memory-service:
    build: .
    command:
      - hermes-vault-memory
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8787"
    depends_on:
      - qdrant
    environment:
      HVM_VAULT_ROOTS: /vault/root-1:/vault/root-2:/vault/root-3
      HVM_DATA_DIR: /data
      HVM_QDRANT_URL: http://qdrant:6333
      HVM_QDRANT_PATH: /data/qdrant
      HVM_MANIFEST_PATH: /data/manifest.json
      HVM_SYNC_POLL_SECONDS: 60
      HVM_SYNC_FULL_RESYNC_SECONDS: 21600
      HVM_COLLECTION_NAME: hermes_vault_memory
      HVM_EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      HVM_CHUNK_SIZE: 1600
      HVM_CHUNK_OVERLAP: 200
    ports:
      - 8787:8787
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health').read()"
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - ${HVM_HOST_VAULT_1:?set HVM_HOST_VAULT_1}:/vault/root-1:ro
      - ${HVM_HOST_VAULT_2:?set HVM_HOST_VAULT_2}:/vault/root-2:ro
      - ${HVM_HOST_VAULT_3:?set HVM_HOST_VAULT_3}:/vault/root-3:ro
      - hermes-vault-memory-data:/data
    restart: unless-stopped
volumes:
  qdrant-storage: null
  hermes-vault-memory-data: null
networks:
  dokploy-network:
    external: true
